spring:
  application:
    name: heapdog


  h2:
    console:
      enabled: true
      path: /h2-console
  datasource:
#    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    url: jdbc:h2:file:~/heapdog
    driver-class-name: org.h2.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

bcrypt:
  strength: ${BCRYPT_SALT_ROUNDS:10}

jwt:
  secret:${JWT_SECRET}

logging:
  level:
    org.springframework.security: warn