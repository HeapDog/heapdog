spring:
  application:
    name: heapdog
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.H2Dialect

bcrypt:
  strength: 10

jwt:
  secret: a-very-secret-key-for-testing-purposes-only-change-it-in-production-too

logging:
  level:
    org.springframework.security: trace