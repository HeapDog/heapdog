spring:
  application:
    name: codesirius
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USER}
    password: ${DB_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

bcrypt:
  strength: ${BCRYPT_SALT_ROUNDS:10}

jwt:
  secret: lkjklhd098239oiu32kj32op8903hkjl3hjk3bv09832o9iuj3lk

logging:
  level:
    org.springframework.security: trace